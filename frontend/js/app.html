<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeSprint</title>
  <!-- Bootstrap or custom CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles/main.css">
</head>
<body onload="showLoginOnly()">
  <header class="text-center">
    <h1>Welcome to CodeSprint</h1>
  </header>

  <!-- Login Section -->
  <section id="loginSection">
    <div class="container">
      <h2 class="mt-4">Login</h2>
      <form id="loginForm">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" id="username" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="contest_id" class="form-label">Contest ID (optional)</label>
          <input type="number" id="contest_id" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
      <div id="loginMessage"></div>
    </div>
  </section>

  <!-- Main Content (hidden initially) -->
  <section id="mainContent" style="display:none;">
    <div class="container mt-4">
      <div class="row">
        <!-- Contests List -->
        <div class="col-md-6">
          <h2>Contests</h2>
          <ul id="contestsList" class="list-group">
            <!-- Contest items will be dynamically inserted here -->
          </ul>
        </div>

        <!-- Create Contest -->
        <div class="col-md-6">
          <h2>Create Contest</h2>
          <form id="createContestForm">
            <div class="mb-3">
              <label for="title" class="form-label">Title</label>
              <input type="text" id="title" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="description" class="form-label">Description</label>
              <textarea id="description" class="form-control" required></textarea>
            </div>
            <div class="mb-3">
              <label for="start_time" class="form-label">Start Time</label>
              <input type="datetime-local" id="start_time" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="end_time" class="form-label">End Time</label>
              <input type="datetime-local" id="end_time" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Create Contest</button>
          </form>
        </div>
      </div>

      <!-- Contest Problems Page (Hidden initially) -->
      <div id="contestProblemsPage" style="display:none;">
        <h2>Contest Problems</h2>
        <ul id="problemsList" class="list-group">
          <!-- Problems for the selected contest will be dynamically inserted here -->
        </ul>
        <button onclick="goBackToContests()" class="btn btn-secondary">Back to Contests</button>
      </div>

      <!-- Problem Details Page (Hidden initially) -->
      <div id="problemDetailsPage" style="display:none;">
        <h2 id="problemTitle"></h2>
        <p id="problemDescription"></p>
        <form id="submitCodeForm">
          <div class="mb-3">
            <label for="language" class="form-label">Language</label>
            <select id="language" class="form-control">
              <option value="cpp">C++</option>
              <option value="python">Python</option>
              <option value="java">Java</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="code" class="form-label">Code</label>
            <textarea id="code" class="form-control" placeholder="Write your code here..." rows="5"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Submit Code</button>
        </form>
        <div id="submissionResult"></div>
        <button onclick="goBackToContests()" class="btn btn-secondary">Back to Contests</button>
      </div>

      <!-- Code Submission Section -->
      <div class="row mt-5">
        <div class="col-md-6">
          <h2>Submit Code</h2>
          <form id="submitCodeForm">
            <div class="mb-3">
              <label for="problem_id" class="form-label">Problem ID</label>
              <input type="text" id="problem_id" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="language" class="form-label">Language</label>
              <select id="language" class="form-control">
                <option value="cpp">C++</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="code" class="form-label">Code</label>
              <textarea id="code" class="form-control" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Submit Code</button>
          </form>
          <div id="submissionResult"></div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
